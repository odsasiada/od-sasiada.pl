<!-- @dsCard group="Colors" viewport="700x150" name="Terracotta accent" subtitle="The CTA colour — Kup / Dodaj do koszyka. Warm, earthy, never neon." -->
<!doctype html>
<html lang="pl">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--surface-page); }
  .row { display: flex; gap: 0; border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow-sm); }
  .sw { flex: 1; height: 84px; display: flex; flex-direction: column; justify-content: flex-end; padding: 8px; }
  .sw span { font-family: var(--font-mono); font-size: 11px; line-height: 1.3; }
  .step { font-weight: 700; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--terracotta-50)"><span class="step" style="color:var(--terracotta-900)">50</span><span style="color:var(--terracotta-700)">#fcf1ec</span></div>
    <div class="sw" style="background:var(--terracotta-100)"><span class="step" style="color:var(--terracotta-900)">100</span><span style="color:var(--terracotta-700)">#f8ddd1</span></div>
    <div class="sw" style="background:var(--terracotta-200)"><span class="step" style="color:var(--terracotta-900)">200</span><span style="color:var(--terracotta-800)">#efb9a3</span></div>
    <div class="sw" style="background:var(--terracotta-300)"><span class="step" style="color:var(--terracotta-900)">300</span><span style="color:var(--terracotta-900)">#e59070</span></div>
    <div class="sw" style="background:var(--terracotta-400)"><span class="step" style="color:#fff">400</span><span style="color:var(--terracotta-50)">#d97048</span></div>
    <div class="sw" style="background:var(--terracotta-500)"><span class="step" style="color:#fff">500 ★</span><span style="color:var(--terracotta-50)">#c75b39</span></div>
    <div class="sw" style="background:var(--terracotta-600)"><span class="step" style="color:#fff">600</span><span style="color:var(--terracotta-50)">#b04a2c</span></div>
    <div class="sw" style="background:var(--terracotta-700)"><span class="step" style="color:#fff">700</span><span style="color:var(--terracotta-100)">#8f3a22</span></div>
    <div class="sw" style="background:var(--terracotta-800)"><span class="step" style="color:#fff">800</span><span style="color:var(--terracotta-100)">#6f2e1c</span></div>
    <div class="sw" style="background:var(--terracotta-900)"><span class="step" style="color:#fff">900</span><span style="color:var(--terracotta-100)">#532316</span></div>
  </div>
</body>
</html>
