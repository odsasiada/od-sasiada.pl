<!-- @dsCard group="Type" viewport="700x260" name="Type scale" subtitle="Modular ~1.2 ramp, rem-based. Mobile-first floor at 14px for UI." -->
<!doctype html>
<html lang="pl">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px 24px; background: var(--surface-card); font-family: var(--font-body); }
  .r { display: flex; align-items: baseline; gap: 16px; padding: 3px 0; border-bottom: 1px dashed var(--border-hairline); }
  .r:last-child { border-bottom: 0; }
  .tok { font-family: var(--font-mono); font-size: 11px; color: var(--text-faint); width: 96px; flex-shrink: 0; }
  .spec { color: var(--text-body); font-family: var(--font-display); font-weight: 700; line-height: 1.1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
</style>
</head>
<body>
  <div class="r"><span class="tok">--text-2xl 36</span><span class="spec" style="font-size:36px">Z ogródka sąsiada</span></div>
  <div class="r"><span class="tok">--text-xl 28</span><span class="spec" style="font-size:28px">Z ogródka sąsiada</span></div>
  <div class="r"><span class="tok">--text-lg 22</span><span class="spec" style="font-size:22px">Z ogródka sąsiada</span></div>
  <div class="r"><span class="tok">--text-md 18</span><span class="spec" style="font-size:18px;font-family:var(--font-body)">Z ogródka sąsiada</span></div>
  <div class="r"><span class="tok">--text-base 16</span><span class="spec" style="font-size:16px;font-family:var(--font-body);font-weight:500">Z ogródka sąsiada</span></div>
  <div class="r"><span class="tok">--text-sm 14</span><span class="spec" style="font-size:14px;font-family:var(--font-body);font-weight:500;color:var(--text-muted)">Z ogródka sąsiada</span></div>
  <div class="r"><span class="tok">--text-xs 13</span><span class="spec" style="font-size:13px;font-family:var(--font-body);font-weight:500;color:var(--text-faint)">Z ogródka sąsiada</span></div>
</body>
</html>
