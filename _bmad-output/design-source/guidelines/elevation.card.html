<!-- @dsCard group="Spacing" viewport="700x170" name="Elevation" subtitle="Soft, warm-tinted shadows. Cards rest on paper, never float in a void." -->
<!doctype html>
<html lang="pl">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 28px 24px; background: var(--surface-page); font-family: var(--font-body); display: flex; align-items: center; gap: 24px; flex-wrap: wrap; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .box { width: 92px; height: 64px; background: var(--surface-card); border-radius: var(--radius-lg); }
  .tok { font-family: var(--font-mono); font-size: 11px; color: var(--text-faint); }
</style>
</head>
<body>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-xs)"></div><span class="tok">xs</span></div>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-sm)"></div><span class="tok">sm</span></div>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-md)"></div><span class="tok">md ★</span></div>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-lg)"></div><span class="tok">lg</span></div>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-xl)"></div><span class="tok">xl</span></div>
</body>
</html>
