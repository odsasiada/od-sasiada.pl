<!-- @dsCard group="Colors" viewport="700x196" name="shadcn semantic roles" subtitle="HSL-channel tokens consumed via hsl(var(--token)). The Tailwind/shadcn contract." -->
<!doctype html>
<html lang="pl">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--surface-page); display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
  .role { border-radius: var(--radius-md); overflow: hidden; border: 1px solid var(--border-hairline); }
  .chip { height: 44px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; }
  .name { font-family: var(--font-mono); font-size: 10.5px; padding: 5px 7px; background: var(--surface-card); color: var(--text-muted); }
</style>
</head>
<body>
  <div class="role"><div class="chip" style="background:hsl(var(--background));color:hsl(var(--foreground))">Aa</div><div class="name">--background</div></div>
  <div class="role"><div class="chip" style="background:hsl(var(--card));color:hsl(var(--card-foreground))">Aa</div><div class="name">--card</div></div>
  <div class="role"><div class="chip" style="background:hsl(var(--primary));color:hsl(var(--primary-foreground))">Aa</div><div class="name">--primary</div></div>
  <div class="role"><div class="chip" style="background:hsl(var(--accent));color:hsl(var(--accent-foreground))">Aa</div><div class="name">--accent</div></div>
  <div class="role"><div class="chip" style="background:hsl(var(--secondary));color:hsl(var(--secondary-foreground))">Aa</div><div class="name">--secondary</div></div>
  <div class="role"><div class="chip" style="background:hsl(var(--muted));color:hsl(var(--muted-foreground))">Aa</div><div class="name">--muted</div></div>
  <div class="role"><div class="chip" style="background:hsl(var(--destructive));color:hsl(var(--destructive-foreground))">Aa</div><div class="name">--destructive</div></div>
  <div class="role"><div class="chip" style="background:hsl(var(--warning));color:hsl(var(--warning-foreground))">Aa</div><div class="name">--warning</div></div>
  <div class="role"><div class="chip" style="background:hsl(var(--border));color:hsl(var(--foreground))">Aa</div><div class="name">--border</div></div>
  <div class="role"><div class="chip" style="background:hsl(var(--background));box-shadow:var(--ring-focus) inset;color:hsl(var(--foreground))">Aa</div><div class="name">--ring</div></div>
</body>
</html>
