<!doctype html>
<html lang="pl">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--surface-page); display: flex; gap: 16px; flex-wrap: wrap; align-items: stretch; }
  .tile { background: var(--surface-card); border: 1px solid var(--border-hairline); border-radius: var(--radius-lg); padding: 18px 22px; display: flex; align-items: center; box-shadow: var(--shadow-sm); }
  .tile.green { background: var(--brand); border-color: var(--brand); }
</style>
</head>
<body>
  <div class="tile"><img src="../assets/logo/odsasiada-mark.svg" height="48" alt="mark"></div>
  <div class="tile"><img src="../assets/logo/odsasiada-wordmark.svg" height="44" alt="wordmark"></div>
  <div class="tile green"><img src="../assets/logo/odsasiada-wordmark-light.svg" height="44" alt="wordmark light"></div>
</body>
</html>
