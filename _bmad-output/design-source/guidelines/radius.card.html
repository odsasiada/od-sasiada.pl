<!-- @dsCard group="Spacing" viewport="700x150" name="Radius" subtitle="Soft, friendly corners — a wooden table, not sharp material design." -->
<!doctype html>
<html lang="pl">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--surface-card); font-family: var(--font-body); display: flex; align-items: flex-end; gap: 20px; flex-wrap: wrap; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .box { width: 72px; height: 56px; background: var(--green-100); border: 1.5px solid var(--green-400); }
  .tok { font-family: var(--font-mono); font-size: 11px; color: var(--text-faint); }
</style>
</head>
<body>
  <div class="col"><div class="box" style="border-radius:var(--radius-sm)"></div><span class="tok">sm · 6</span></div>
  <div class="col"><div class="box" style="border-radius:var(--radius-md)"></div><span class="tok">md · 8</span></div>
  <div class="col"><div class="box" style="border-radius:var(--radius-lg)"></div><span class="tok">lg · 12 ★</span></div>
  <div class="col"><div class="box" style="border-radius:var(--radius-xl)"></div><span class="tok">xl · 16</span></div>
  <div class="col"><div class="box" style="border-radius:var(--radius-2xl)"></div><span class="tok">2xl · 24</span></div>
  <div class="col"><div class="box" style="width:96px;border-radius:var(--radius-pill)"></div><span class="tok">pill · 999</span></div>
</body>
</html>
