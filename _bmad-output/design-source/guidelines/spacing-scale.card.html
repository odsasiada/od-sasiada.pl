<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing scale" subtitle="4px base grid. Named steps; avoid magic px values." -->
<!doctype html>
<html lang="pl">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--surface-card); font-family: var(--font-body); display: flex; align-items: flex-end; gap: 16px; flex-wrap: wrap; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .bar { background: var(--green-200); border: 1px solid var(--green-300); border-radius: var(--radius-sm); }
  .tok { font-family: var(--font-mono); font-size: 10.5px; color: var(--text-faint); }
</style>
</head>
<body>
  <div class="col"><div class="bar" style="width:4px;height:4px"></div><span class="tok">1·4</span></div>
  <div class="col"><div class="bar" style="width:8px;height:8px"></div><span class="tok">2·8</span></div>
  <div class="col"><div class="bar" style="width:12px;height:12px"></div><span class="tok">3·12</span></div>
  <div class="col"><div class="bar" style="width:16px;height:16px"></div><span class="tok">4·16</span></div>
  <div class="col"><div class="bar" style="width:20px;height:20px"></div><span class="tok">5·20</span></div>
  <div class="col"><div class="bar" style="width:24px;height:24px"></div><span class="tok">6·24</span></div>
  <div class="col"><div class="bar" style="width:32px;height:32px"></div><span class="tok">8·32</span></div>
  <div class="col"><div class="bar" style="width:48px;height:48px"></div><span class="tok">12·48</span></div>
  <div class="col"><div class="bar" style="width:64px;height:64px"></div><span class="tok">16·64</span></div>
</body>
</html>
