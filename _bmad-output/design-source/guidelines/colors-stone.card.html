<!-- @dsCard group="Colors" viewport="700x150" name="Stone neutrals" subtitle="Warm neutral ramp — paper, cards, borders, ink. Never pure grey." -->
<!doctype html>
<html lang="pl">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--surface-page); }
  .row { display: flex; gap: 0; border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow-sm); border: 1px solid var(--border-hairline); }
  .sw { flex: 1; height: 84px; display: flex; flex-direction: column; justify-content: flex-end; padding: 8px; }
  .sw span { font-family: var(--font-mono); font-size: 11px; line-height: 1.3; }
  .step { font-weight: 700; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--stone-50)"><span class="step" style="color:var(--stone-900)">50</span><span style="color:var(--stone-700)">#faf9f6</span></div>
    <div class="sw" style="background:var(--stone-100)"><span class="step" style="color:var(--stone-900)">100 ★</span><span style="color:var(--stone-700)">#f7f6f2</span></div>
    <div class="sw" style="background:var(--stone-200)"><span class="step" style="color:var(--stone-900)">200</span><span style="color:var(--stone-700)">#efede6</span></div>
    <div class="sw" style="background:var(--stone-300)"><span class="step" style="color:var(--stone-900)">300 ★</span><span style="color:var(--stone-700)">#e4e2da</span></div>
    <div class="sw" style="background:var(--stone-400)"><span class="step" style="color:var(--stone-900)">400</span><span style="color:var(--stone-800)">#d3d0c5</span></div>
    <div class="sw" style="background:var(--stone-500)"><span class="step" style="color:#fff">500</span><span style="color:var(--stone-50)">#b0ada1</span></div>
    <div class="sw" style="background:var(--stone-600)"><span class="step" style="color:#fff">600</span><span style="color:var(--stone-50)">#898d85</span></div>
    <div class="sw" style="background:var(--stone-700)"><span class="step" style="color:#fff">700 ★</span><span style="color:var(--stone-100)">#6b716c</span></div>
    <div class="sw" style="background:var(--stone-800)"><span class="step" style="color:#fff">800</span><span style="color:var(--stone-100)">#4b504b</span></div>
    <div class="sw" style="background:var(--stone-900)"><span class="step" style="color:#fff">900 ★</span><span style="color:var(--stone-100)">#1f2421</span></div>
  </div>
</body>
</html>
