<!-- @dsCard group="Colors" viewport="700x150" name="Brand green" subtitle="Leading colour + success. 600/700 are the originals from the codebase." -->
<!doctype html>
<html lang="pl">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--surface-page); }
  .row { display: flex; gap: 0; border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow-sm); }
  .sw { flex: 1; height: 84px; display: flex; flex-direction: column; justify-content: flex-end; padding: 8px; }
  .sw span { font-family: var(--font-mono); font-size: 11px; line-height: 1.3; }
  .step { font-weight: 700; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--green-50)"><span class="step" style="color:var(--green-900)">50</span><span style="color:var(--green-800)">#eef6f0</span></div>
    <div class="sw" style="background:var(--green-100)"><span class="step" style="color:var(--green-900)">100</span><span style="color:var(--green-800)">#d6ebdb</span></div>
    <div class="sw" style="background:var(--green-200)"><span class="step" style="color:var(--green-900)">200</span><span style="color:var(--green-800)">#aed7b8</span></div>
    <div class="sw" style="background:var(--green-300)"><span class="step" style="color:var(--green-900)">300</span><span style="color:var(--green-900)">#7dbd8d</span></div>
    <div class="sw" style="background:var(--green-400)"><span class="step" style="color:#fff">400</span><span style="color:var(--green-50)">#4f9e64</span></div>
    <div class="sw" style="background:var(--green-500)"><span class="step" style="color:#fff">500</span><span style="color:var(--green-50)">#3a8a4f</span></div>
    <div class="sw" style="background:var(--green-600)"><span class="step" style="color:#fff">600 ★</span><span style="color:var(--green-50)">#2f7a3f</span></div>
    <div class="sw" style="background:var(--green-700)"><span class="step" style="color:#fff">700 ★</span><span style="color:var(--green-100)">#245f31</span></div>
    <div class="sw" style="background:var(--green-800)"><span class="step" style="color:#fff">800</span><span style="color:var(--green-100)">#1e4d29</span></div>
    <div class="sw" style="background:var(--green-900)"><span class="step" style="color:#fff">900</span><span style="color:var(--green-100)">#173c20</span></div>
  </div>
</body>
</html>
